name: Test

on:
  push:
    branches:
      - main
      - beta
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/*.yml"

  pull_request:
    branches:
      - main
      - beta
      - 'feature/**'
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/*.yml"

jobs:

# ──────────────────────────────────────────────────────────────
#  Lint
# ──────────────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ".go-version"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

# ──────────────────────────────────────────────────────────────
#  Test
# ──────────────────────────────────────────────────────────────

  test:
    name: Test (Go ${{ matrix.go-version }})
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.23", "1.24"]

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          PKGS=$(go list ./... | grep -Ev '/examples/|/internal/testutil')
          go test $PKGS -race -coverpkg=$PKGS -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.24'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt


# ──────────────────────────────────────────────────────────────
#  Notification
# ──────────────────────────────────────────────────────────────

  notification:
    name: Notification
    needs:
      - lint
      - test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Slack Workflow Notification
        uses: Gamesight/slack-workflow-status@88ee95b73b4669825883ddf22747966204663e58 # v1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
